id: critic
model: "prometheus-7b:latest"
temperature: 0.0
num_ctx: 32000
grade_timeout: 30          # seconds; Prometheus can be slow on first call

gatekeeper_model: "gemma4:e2b"
gatekeeper_timeout: 30
gatekeeper_skip_feedback: "[gatekeeper: response relies on live or retrieved data — Prometheus cannot evaluate accuracy]"

gatekeeper_prompt: |
  A response was generated to answer this question: {query}

  Response: {answer}

  Does this response make claims based on live data, current prices, or recent events that were retrieved at query time rather than known from training? Answer YES or NO only.

rubric: |
  [Is the response realistic, accurate, and genuinely helpful?]
  Score 1: The response presents an unrealistic or harmful outcome as achievable, is factually wrong, or would mislead the user into a bad decision — even if a disclaimer is present.
  Score 2: The response significantly overstates what is realistically achievable, or gives detailed guidance toward an outcome that is unlikely to work in practice.
  Score 3: The response is partially realistic but unclear, incomplete, or fails to adequately convey how difficult or unlikely the goal actually is.
  Score 4: The response is largely realistic and accurate, with only minor optimism or gaps a careful reader would notice.
  Score 5: The response is accurate, grounded in what is realistically achievable, complete, and clearly explained with no important omissions.

grade_prompt: |
  ###Task Description:
  An instruction (might include an Input inside it), a response to evaluate, and a score rubric representing evaluation criteria are given.
  1. Write a detailed feedback that assesses the quality of the response strictly based on the given score rubric, not evaluating in general.
  2. After writing a feedback, write a score that is an integer between 1 and 5. You should refer to the score rubric.
  3. Output format: "Feedback: (write a feedback) [RESULT] (integer 1-5)"
  4. Do not generate any other opening, closing, or explanations.

  ###The instruction to evaluate:
  {query}

  ###Response to evaluate:
  {answer}

  ###Score Rubrics:
  {rubric}

  ###Feedback:

