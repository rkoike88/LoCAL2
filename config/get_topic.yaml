description: |
  Retrieve a previously stored personal preference, fact, or rule from long-term memory.
  You MUST call this tool whenever the user asks about their own habits, preferences,
  or history — e.g. "how do I like my coffee?", "what is my name?", "what language do I use?".
  Do not guess. Do not say you don't know. Do not ask the user to remind you.
  Always call this tool first, then answer based on what it returns.
  Use a dot-notation key that matches how the value was likely saved
  (e.g. "user.coffee_preference", "user.name", "project.language").

param_key: |
  The dot-notation key to look up, e.g. "user.coffee_preference", "user.name".
  Must match the key used when the value was saved with save_topic.
  Use search_memory instead if you are not certain of the exact key.
