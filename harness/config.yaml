local2_url: "ws://localhost:8000"
idle_timeout: 150          # seconds of silence on either arm before considered hung (should exceed tool_timeout in generator.yaml)

arm_b:
  backend: ollama
  model: gemma4:e4b-mlx
  temperature: 1.0
  top_p: 0.95
  top_k: 64
  system_prompt: ""
  tools:
    web_search: true
    web_fetch: true

search:
  searxng_url: "http://localhost:8080"
  max_results: 5
  timeout: 10

fetch:
  max_chars: 12000
  timeout: 15

harness_port: 7001
db_path: "harness.db"

judge:
  model: "prometheus-7b:latest"
  temperature: 0.0
  num_ctx: 32000
  double_judge: true          # run both positions; win condition = win both passes
  position: "native_first"   # used only when double_judge: false
  rubric: |
    [Which response is more helpful, accurate, and comprehensive?
    Consider: factual correctness, depth of reasoning, practical usefulness, and clarity.
    Prefer the response that would leave the user better informed or more capable of acting on the information.]
