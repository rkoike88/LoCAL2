<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoCAL2 Harness</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       #111;
    --surface1: #181818;
    --surface2: #1e1e1e;
    --surface3: #2a2a2a;
    --text:     #ccc;
    --muted:    #666;
    --accent:   #7ec8a4;
    --red:      #e06c75;
    --blue:     #9dbde8;
    --gold:     #c8a47e;
    --border:   #2a2a2a;
  }
  body { font-family: 'Menlo', monospace; background: var(--bg); color: var(--text);
         font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* --- Header --- */
  header { display: flex; align-items: center; gap: 12px; padding: 8px 16px;
           border-bottom: 1px solid var(--border); background: var(--surface1); flex-shrink: 0; }
  header h1 { color: var(--accent); font-size: 14px; letter-spacing: 0.03em; }
  .run-info { color: var(--muted); font-size: 11px; }
  .user-selector { display: flex; align-items: center; gap: 5px; }
  .user-selector label { color: var(--muted); font-size: 11px; }
  .user-selector input { background: var(--surface2); color: var(--text); border: 1px solid var(--border);
                         border-radius: 3px; padding: 2px 6px; font-family: inherit; font-size: 11px;
                         width: 110px; }
  .user-selector input:focus { outline: none; border-color: var(--accent); }
  .spacer { flex: 1; }

  /* --- Buttons --- */
  button { background: var(--surface3); color: var(--text); border: 1px solid var(--border);
           padding: 4px 12px; border-radius: 4px; cursor: pointer; font-family: inherit;
           font-size: 12px; transition: background 0.15s; }
  button:hover { background: #333; }
  button:disabled { opacity: 0.4; cursor: default; }
  button.primary { background: var(--accent); color: #111; border-color: var(--accent); font-weight: bold; }
  button.primary:hover { background: #6ab893; }

  /* --- Workspace --- */
  .workspace { flex: 1; display: flex; overflow: hidden; }

  /* --- Sidebar --- */
  #sidebar { width: 220px; background: var(--surface1); border-right: 1px solid var(--border);
             display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
             transition: width 0.18s ease; }
  #sidebar.collapsed { width: 0; }
  .sidebar-header { padding: 8px 12px; font-size: 10px; color: var(--muted);
                    border-bottom: 1px solid var(--border); text-transform: uppercase;
                    letter-spacing: 0.06em; flex-shrink: 0; }
  #sidebar-runs { flex: 1; overflow-y: auto; }

  /* Run groups */
  .run-group { border-bottom: 1px solid var(--border); }
  .run-group-header { display: flex; align-items: center; gap: 5px; padding: 7px 10px;
                      cursor: pointer; font-size: 11px; user-select: none; }
  .run-group-header:hover { background: var(--surface2); }
  .run-group-arrow { color: var(--muted); font-size: 9px; transition: transform 0.15s;
                     flex-shrink: 0; }
  .run-group.open .run-group-arrow { transform: rotate(90deg); }
  .run-group-id { color: var(--accent); font-weight: bold; flex-shrink: 0; }
  .run-group-model { color: var(--muted); overflow: hidden; text-overflow: ellipsis;
                     white-space: nowrap; flex: 1; font-size: 10px; }
  .run-group-stats { color: var(--muted); font-size: 10px; flex-shrink: 0; }
  .run-group-turns { display: none; }
  .run-group.open .run-group-turns { display: block; }

  /* Turn items */
  .turn-item { display: flex; align-items: center; gap: 6px; padding: 5px 10px 5px 18px;
               cursor: pointer; font-size: 11px; border-left: 2px solid transparent; }
  .turn-item:hover { background: var(--surface2); }
  .turn-item.active { background: var(--surface3); border-left-color: var(--accent); padding-left: 16px; }
  .verdict-dot { width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid var(--muted);
                 flex-shrink: 0; }
  .verdict-dot.local2_better { background: var(--accent); border-color: var(--accent); }
  .verdict-dot.tie { background: var(--muted); border-color: var(--muted); }
  .verdict-dot.native_better { background: var(--gold); border-color: var(--gold); }
  .turn-num { color: var(--muted); flex-shrink: 0; font-size: 10px; }
  .turn-prompt { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

  /* Sidebar toggle */
  .sidebar-toggle { width: 16px; background: var(--surface2); border-right: 1px solid var(--border);
                    display: flex; align-items: center; justify-content: center; cursor: pointer;
                    color: var(--muted); font-size: 12px; flex-shrink: 0; user-select: none; }
  .sidebar-toggle:hover { background: var(--surface3); color: var(--text); }

  /* --- Workspace main --- */
  .workspace-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* --- Input bar --- */
  .input-bar { display: flex; gap: 8px; padding: 10px 14px;
               border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--surface1); }
  .input-bar textarea { flex: 1; background: var(--surface2); color: var(--text);
                        border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px;
                        font-family: inherit; font-size: 12px; resize: none; outline: none;
                        max-height: 80px; }
  .input-bar textarea:disabled { opacity: 0.5; }
  .input-controls { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }

  /* --- Panels --- */
  .panels { flex: 1; display: flex; overflow: hidden; min-height: 0; }
  .panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }
  .panel:last-child { border-right: none; }
  .panel-header { padding: 6px 12px; background: var(--surface1); border-bottom: 1px solid var(--border);
                  font-size: 11px; color: var(--muted); display: flex; align-items: center;
                  gap: 8px; flex-shrink: 0; }
  .panel-header .label { color: var(--accent); font-weight: bold; }
  .panel-content { flex: 1; overflow-y: auto; padding: 12px; display: flex;
                   flex-direction: column; gap: 8px; }

  /* --- Messages --- */
  .msg { padding: 8px 10px; border-radius: 6px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .msg.user { background: var(--surface2); color: var(--blue); font-size: 12px; }
  .msg.assistant { background: var(--surface1); color: var(--text); font-size: 12px; }
  .msg.assistant.streaming::after { content: '▌'; animation: blink 0.8s step-start infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .msg.tool-call { background: var(--surface2); border-left: 2px solid var(--gold);
                   color: var(--gold); font-size: 11px; padding: 5px 10px; }
  .msg.tool-result { background: var(--surface2); border-left: 2px solid var(--muted);
                     color: var(--muted); font-size: 11px; padding: 5px 10px; }
  .critic-bar { font-size: 11px; color: var(--muted); padding: 4px 10px;
                background: var(--surface2); border-radius: 4px; }
  .critic-bar .score { color: var(--accent); }

  /* --- Thinking block --- */
  .thinking-block { background: var(--surface2); border-left: 2px solid var(--muted);
                    border-radius: 0 4px 4px 0; font-size: 11px; }
  .thinking-block summary { padding: 4px 8px; cursor: pointer; color: var(--muted);
                             user-select: none; list-style: none; }
  .thinking-block summary::before { content: '▸ '; }
  .thinking-block[open] summary::before { content: '▾ '; }
  .thinking-body { padding: 4px 8px 8px; color: var(--muted); white-space: pre-wrap;
                   max-height: 160px; overflow-y: auto; line-height: 1.5; }

  /* --- Prometheus panel --- */
  .prometheus-panel { height: 33vh; border-top: 1px solid var(--border);
                      background: var(--surface1); display: flex; flex-direction: column;
                      flex-shrink: 0; min-height: 80px; }
  .prometheus-header { display: flex; align-items: center; gap: 10px; padding: 8px 14px;
                       border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .prom-label { color: var(--muted); font-size: 11px; text-transform: uppercase;
                letter-spacing: 0.06em; flex-shrink: 0; }
  #prom-verdict { font-size: 12px; font-weight: bold; }
  .prometheus-body { flex: 1; overflow-y: auto; padding: 10px 14px;
                     word-break: break-word; font-size: 12px; line-height: 1.6; color: var(--text); }
  .prom-rubric { margin-bottom: 8px; border: 1px solid var(--border); border-radius: 3px;
                 padding: 4px 8px; background: var(--surface2); }
  .prom-rubric summary { color: var(--muted); font-size: 11px; cursor: pointer;
                          list-style: none; display: flex; gap: 5px; align-items: flex-start; }
  .prom-rubric summary::before { content: '▸'; flex-shrink: 0; }
  .prom-rubric[open] summary::before { content: '▾'; }
  .prom-rubric-body { margin-top: 6px; color: var(--muted); font-size: 11px;
                      white-space: pre-wrap; border-top: 1px solid var(--border); padding-top: 6px; }
  .prom-feedback { white-space: pre-wrap; }

  /* --- Memory capsules --- */
  .memory-capsule { border: 1px solid var(--border); border-radius: 3px; margin-bottom: 4px;
                    background: var(--surface2); }
  .memory-capsule summary { color: var(--blue); font-size: 11px; cursor: pointer; padding: 4px 8px;
                             list-style: none; display: flex; gap: 6px; align-items: baseline; }
  .memory-capsule summary::before { content: '↑'; flex-shrink: 0; }
  .memory-capsule-score { color: var(--muted); font-size: 10px; flex-shrink: 0; }
  .memory-capsule-body { padding: 4px 8px 6px; color: var(--muted); font-size: 11px;
                          white-space: pre-wrap; border-top: 1px solid var(--border); }
  .memory-candidate { opacity: 0.45; }
  .memory-candidate summary { color: var(--muted); }
  .memory-candidate summary::before { content: '↓'; flex-shrink: 0; }
  .memory-candidates-header { color: var(--muted); font-size: 10px; margin: 6px 0 2px;
                               letter-spacing: 0.04em; text-transform: uppercase; }

  /* --- Status --- */
  .status { color: var(--muted); font-size: 11px; }
  .status.streaming { color: var(--gold); }
</style>
</head>
<body>

<header>
  <h1>LoCAL2 Harness</h1>
  <span class="run-info" id="run-info">no active run</span>
  <div class="spacer"></div>
  <div class="user-selector">
    <label for="arm-a-user">A user:</label>
    <input id="arm-a-user" type="text" value="harness" title="LoCAL2 user_id for Arm A sessions">
  </div>
  <button class="primary" id="btn-new">New Run</button>
</header>

<div class="workspace">

  <div id="sidebar">
    <div class="sidebar-header">Runs</div>
    <div id="sidebar-runs"></div>
  </div>
  <div class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">‹</div>

  <div class="workspace-main">

    <div class="input-bar">
      <textarea id="input" placeholder="Message both arms…" rows="2" disabled
                onkeydown="handleKey(event)"></textarea>
      <div class="input-controls">
        <button id="btn-send" onclick="sendQuery()" disabled>Send</button>
        <span class="status" id="status"></span>
      </div>
    </div>

    <div class="panels">
      <div class="panel" id="panel-a">
        <div class="panel-header">
          <span class="label">A — LoCAL2</span>
          <span style="color:var(--muted)" id="a-model"></span>
        </div>
        <div class="panel-content" id="a-content"></div>
      </div>
      <div class="panel" id="panel-b">
        <div class="panel-header">
          <span class="label">B — Native</span>
          <span style="color:var(--muted)" id="b-model"></span>
        </div>
        <div class="panel-content" id="b-content"></div>
      </div>
    </div>

    <div class="prometheus-panel">
      <div class="prometheus-header">
        <span class="prom-label">Prometheus</span>
        <span id="prom-verdict"></span>
        <div class="spacer"></div>
        <span class="status" id="prom-status">Start a run to compare.</span>
        <button id="btn-rejudge" onclick="autoJudge()" disabled>Judge</button>
      </div>
      <div class="prometheus-body" id="prom-body"></div>
    </div>

  </div>
</div>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let runId = null;
let sessionId = null;
let turnIdx = 0;
let currentItemId = null;
let currentQuery = '';
let sidebarCollapsed = false;

let wsA = null, wsB = null;
let aDone = false, bDone = false;
let aFull = '', bFull = '';
let aThinking = '', bThinking = '';
let aToolCalls = [], bToolCalls = [];
let aCurrentTool = null;
let aCapsules = [];
let aCandidates = [];
let aCriticScore = null;
let aStreamEl = null, bStreamEl = null;
let aThinkingEl = null;

const _VERDICT_LABELS = { local2_better: 'LoCAL2 better', tie: 'Tie', native_better: 'Native better' };
const _VERDICT_COLORS = { local2_better: 'var(--accent)', tie: 'var(--muted)', native_better: 'var(--gold)' };

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
window.addEventListener('DOMContentLoaded', loadSidebar);
document.getElementById('btn-new').addEventListener('click', newRun);

// ---------------------------------------------------------------------------
// Sidebar
// ---------------------------------------------------------------------------
function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  document.getElementById('sidebar').classList.toggle('collapsed', sidebarCollapsed);
  document.getElementById('sidebar-toggle').textContent = sidebarCollapsed ? '›' : '‹';
}

async function loadSidebar() {
  const runs = await fetch('/api/runs').then(r => r.json()).catch(() => []);
  const el = document.getElementById('sidebar-runs');
  el.innerHTML = '';

  const details = await Promise.all(runs.map(run => Promise.all([
    fetch(`/api/runs/${run.run_id}`).then(r => r.json()).catch(() => ({ items: [] })),
    fetch(`/api/judgments/${run.run_id}`).then(r => r.json()).catch(() => []),
  ])));

  for (let i = 0; i < runs.length; i++) {
    const [runData, judgments] = details[i];
    const jMap = buildJudgmentMap(judgments);
    el.appendChild(buildRunGroup(runs[i], runData.items || [], jMap));
  }
}

function buildJudgmentMap(judgments) {
  const map = {};
  // prometheus judgments only; keep latest per item (array is time-ordered)
  for (const j of judgments) {
    if (j.judge_type === 'prometheus') map[j.item_id] = j;
  }
  return map;
}

function buildRunGroup(run, items, jMap) {
  const group = document.createElement('div');
  group.className = 'run-group';
  group.id = `run-group-${run.run_id}`;

  const judged = Object.keys(jMap).length;
  const l2Wins = Object.values(jMap).filter(j => j.verdict === 'local2_better').length;
  const ties   = Object.values(jMap).filter(j => j.verdict === 'tie').length;
  const nWins  = Object.values(jMap).filter(j => j.verdict === 'native_better').length;
  const statsText = judged > 0 ? `L:${l2Wins} T:${ties} N:${nWins}` : `${items.length}T`;
  const modelShort = (run.native_model || run.arm_b_model || '').split(':')[0].slice(0, 14);

  const hdr = document.createElement('div');
  hdr.className = 'run-group-header';
  hdr.onclick = () => group.classList.toggle('open');
  hdr.innerHTML = `
    <span class="run-group-arrow">▸</span>
    <span class="run-group-id">${run.run_id}</span>
    <span class="run-group-model">${modelShort}</span>
    <span class="run-group-stats">${statsText}</span>
  `;

  const turnsEl = document.createElement('div');
  turnsEl.className = 'run-group-turns';
  turnsEl.id = `turns-${run.run_id}`;

  for (let i = 0; i < items.length; i++) {
    turnsEl.appendChild(buildTurnItem(items[i], jMap[items[i].item_id], i + 1));
  }

  group.appendChild(hdr);
  group.appendChild(turnsEl);
  return group;
}

function buildTurnItem(item, judgment, seq) {
  const li = document.createElement('div');
  li.className = 'turn-item';
  li.id = `turn-item-${item.item_id}`;

  const verdict = judgment ? judgment.verdict : null;
  const dotClass = verdict || '';
  const promptPreview = (item.prompt || '').slice(0, 36) + ((item.prompt || '').length > 36 ? '…' : '');

  li.innerHTML = `
    <span class="verdict-dot ${dotClass}"></span>
    <span class="turn-num">${seq != null ? seq : ''}</span>
    <span class="turn-prompt">${escHtml(promptPreview)}</span>
  `;
  li.onclick = () => viewTurn(item);
  return li;
}

function updateSidebarTurnVerdict(itemId, verdict) {
  const li = document.getElementById(`turn-item-${itemId}`);
  if (!li) return;
  const dot = li.querySelector('.verdict-dot');
  if (dot) dot.className = `verdict-dot ${verdict}`;
}

function setActiveTurnItem(itemId) {
  document.querySelectorAll('.turn-item.active').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`turn-item-${itemId}`);
  if (el) el.classList.add('active');
}

function openRunGroup(rid) {
  const g = document.getElementById(`run-group-${rid}`);
  if (g) g.classList.add('open');
}

function addTurnToSidebar(item, judgment) {
  const turnsEl = document.getElementById(`turns-${item.run_id}`);
  if (!turnsEl) { loadSidebar(); return; }

  const existing = document.getElementById(`turn-item-${item.item_id}`);
  const seq = existing ? Array.from(turnsEl.children).indexOf(existing) + 1 : turnsEl.children.length + 1;
  const li = buildTurnItem(item, judgment, seq);
  if (existing) existing.replaceWith(li);
  else turnsEl.appendChild(li);

  openRunGroup(item.run_id);
  setActiveTurnItem(item.item_id);
}

// ---------------------------------------------------------------------------
// New Run
// ---------------------------------------------------------------------------
async function newRun() {
  clearPanels();
  document.getElementById('prom-verdict').textContent = '';
  document.getElementById('prom-body').textContent = '';
  setPromStatus('Start a comparison.');
  document.getElementById('btn-rejudge').disabled = true;
  currentItemId = null;

  const res = await fetch('/api/runs', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
  const data = await res.json();
  runId = data.run_id;
  sessionId = crypto.randomUUID();
  turnIdx = 0;
  aCriticScore = null;

  document.getElementById('run-info').textContent = `run: ${runId}  native: ${data.native_model || ''}`;
  document.getElementById('b-model').textContent = data.native_model || '';
  document.getElementById('input').disabled = false;
  document.getElementById('btn-send').disabled = false;
  document.getElementById('input').focus();
  setStatus('');

  // Add to top of sidebar
  const runEntry = { run_id: runId, native_model: data.native_model, created_at: Date.now() / 1000 };
  const group = buildRunGroup(runEntry, [], {});
  group.classList.add('open');
  const sbRuns = document.getElementById('sidebar-runs');
  sbRuns.insertBefore(group, sbRuns.firstChild);

  closeWS();
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  wsA = new WebSocket(`${proto}://${location.host}/arm_a/${sessionId}`);
  wsB = new WebSocket(`${proto}://${location.host}/arm_b/${sessionId}`);
  wsA.onmessage = e => handleAEvent(JSON.parse(e.data));
  wsB.onmessage = e => handleBEvent(JSON.parse(e.data));
  wsA.onerror = () => setStatus('arm_a error');
  wsB.onerror = () => setStatus('arm_b error');
}

function closeWS() {
  if (wsA) { wsA.close(); wsA = null; }
  if (wsB) { wsB.close(); wsB = null; }
}

// ---------------------------------------------------------------------------
// Send Query
// ---------------------------------------------------------------------------
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
}

function sendQuery() {
  const q = document.getElementById('input').value.trim();
  if (!q || !wsA || !wsB) return;

  aDone = false; bDone = false;
  aFull = ''; bFull = '';
  aThinking = ''; bThinking = '';
  aToolCalls = []; bToolCalls = [];
  aCurrentTool = null; bCurrentTool = null;
  aCapsules = [];
  aCandidates = [];
  aCriticScore = null;
  currentItemId = null;
  aThinkingEl = null;
  bThinkingEl = null;

  currentQuery = q;
  document.getElementById('input').value = '';

  clearPanels();
  appendMsg('a-content', 'user', q);
  appendMsg('b-content', 'user', q);
  aStreamEl = appendMsg('a-content', 'assistant streaming', '');
  bStreamEl = appendMsg('b-content', 'assistant streaming', '');

  setStatus('streaming…', true);
  setPromStatus('Waiting for responses…');
  document.getElementById('prom-verdict').textContent = '';
  document.getElementById('prom-body').textContent = '';
  document.getElementById('btn-rejudge').disabled = true;
  document.getElementById('btn-send').disabled = true;
  document.getElementById('input').disabled = true;

  const armAUser = (document.getElementById('arm-a-user').value || 'harness').trim();
  wsA.send(JSON.stringify({ query: q, run_id: runId, user_id: armAUser }));
  wsB.send(JSON.stringify({ query: q, run_id: runId }));
  turnIdx++;
}

// ---------------------------------------------------------------------------
// Arm A events (LoCAL2 ws_bridge format)
// ---------------------------------------------------------------------------
function handleAEvent(ev) {
  switch (ev.type) {
    case 'thinking_chunk':
      aThinking += (ev.chunk || '');
      if (!aThinkingEl) aThinkingEl = createThinkingBlock('a-content');
      aThinkingEl.querySelector('.thinking-body').textContent += (ev.chunk || '');
      break;
    case 'tool_start':
      aCurrentTool = { tool: ev.tool, args: ev.args || {}, result: '' };
      finaliseStreamEl('a');
      appendMsg('a-content', 'tool-call', `→ ${ev.tool}(${JSON.stringify(ev.args || {})})`);
      aStreamEl = appendMsg('a-content', 'assistant streaming', '');
      break;
    case 'tool_result':
      if (aCurrentTool) { aCurrentTool.result = ev.result || ''; aToolCalls.push(aCurrentTool); aCurrentTool = null; }
      appendMsg('a-content', 'tool-result', `← ${ev.tool}: ${(ev.result || '').slice(0, 300)}`);
      break;
    case 'response':
      aFull = ev.answer || '';
      aCapsules = ev.capsules || [];
      aCandidates = ev.candidates || [];
      renderMemoryCandidates('a-content', aCapsules, aCandidates);
      if (aStreamEl) { aStreamEl.textContent = aFull; aStreamEl.classList.remove('streaming'); aStreamEl = null; }
      aDone = true;
      checkBothDone();
      break;
    case 'critique':
      aCriticScore = ev.score;
      appendCriticBar('a-content', ev.score, ev.rubric_name);
      if (currentItemId) updateItemCritic(currentItemId, ev.score);
      break;
  }
}

// ---------------------------------------------------------------------------
// Arm B events (LoCAL2 ws_bridge format, native=true)
// ---------------------------------------------------------------------------
let bThinkingEl = null;
let bCurrentTool = null;

function handleBEvent(ev) {
  switch (ev.type) {
    case 'thinking_chunk':
      bThinking += (ev.chunk || '');
      if (!bThinkingEl) bThinkingEl = createThinkingBlock('b-content');
      bThinkingEl.querySelector('.thinking-body').textContent += (ev.chunk || '');
      break;
    case 'tool_start':
      bCurrentTool = { tool: ev.tool, args: ev.args || {}, result: '' };
      finaliseStreamEl('b');
      appendMsg('b-content', 'tool-call', `→ ${ev.tool}(${JSON.stringify(ev.args || {})})`);
      bStreamEl = appendMsg('b-content', 'assistant streaming', '');
      break;
    case 'tool_result':
      if (bCurrentTool) { bCurrentTool.result = ev.result || ''; bToolCalls.push(bCurrentTool); bCurrentTool = null; }
      appendMsg('b-content', 'tool-result', `← ${ev.tool}: ${(ev.result || '').slice(0, 300)}`);
      break;
    case 'response':
      bFull = ev.answer || '';
      if (bStreamEl) { bStreamEl.textContent = bFull; bStreamEl.classList.remove('streaming'); bStreamEl = null; }
      bDone = true;
      checkBothDone();
      break;
  }
}

function finaliseStreamEl(arm) {
  const el = arm === 'a' ? aStreamEl : bStreamEl;
  if (el) el.classList.remove('streaming');
  if (arm === 'a') aStreamEl = null; else bStreamEl = null;
}

// ---------------------------------------------------------------------------
// Both done → log item → auto-judge
// ---------------------------------------------------------------------------
async function checkBothDone() {
  if (!aDone || !bDone) return;

  setStatus('');
  document.getElementById('btn-send').disabled = false;
  document.getElementById('input').disabled = false;

  const res = await fetch('/api/items', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      run_id: runId, session_id: sessionId, turn_idx: turnIdx,
      prompt: currentQuery,
      arm_a_output: aFull, arm_a_thinking: aThinking, arm_a_tool_calls: aToolCalls,
      arm_a_capsules: aCapsules, arm_a_candidates: aCandidates,
      arm_b_output: bFull, arm_b_thinking: bThinking, arm_b_tool_calls: bToolCalls,
      arm_a_critic_score: aCriticScore,
    }),
  });
  const data = await res.json();
  currentItemId = data.item_id;

  // Add pending turn to sidebar
  addTurnToSidebar({
    item_id: data.item_id, run_id: runId, turn_idx: turnIdx,
    prompt: currentQuery, arm_a_output: aFull, arm_b_output: bFull,
    arm_a_critic_score: aCriticScore,
  }, null);

  document.getElementById('btn-rejudge').disabled = false;
  autoJudge();
}

async function updateItemCritic(itemId, score) {
  await fetch('/api/items', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      run_id: runId, session_id: sessionId, turn_idx: turnIdx,
      prompt: currentQuery,
      arm_a_output: aFull, arm_a_thinking: aThinking, arm_a_tool_calls: aToolCalls,
      arm_a_capsules: aCapsules, arm_a_candidates: aCandidates,
      arm_b_output: bFull, arm_b_thinking: bThinking, arm_b_tool_calls: bToolCalls,
      arm_a_critic_score: score,
      item_id: itemId,
    }),
  });
}

// ---------------------------------------------------------------------------
// View historical turn (sidebar click)
// ---------------------------------------------------------------------------
async function viewTurn(item) {
  currentItemId = item.item_id;
  setActiveTurnItem(item.item_id);
  clearPanels();

  // A panel — thinking, tool calls, response, critic bar
  appendMsg('a-content', 'user', item.prompt || '');
  const aThinkingStored = (item.arm_a_thinking || '').trim();
  if (aThinkingStored) {
    const d = createThinkingBlock('a-content');
    d.querySelector('.thinking-body').textContent = aThinkingStored;
  }
  for (const tc of parseToolCalls(item.arm_a_tool_calls)) {
    appendMsg('a-content', 'tool-call', `→ ${tc.tool}(${JSON.stringify(tc.args || {})})`);
    if (tc.result != null) appendMsg('a-content', 'tool-result', `← ${tc.tool}: ${String(tc.result).slice(0, 300)}`);
  }
  const storedCapsules = parseToolCalls(item.arm_a_capsules);
  const storedCandidates = parseToolCalls(item.arm_a_candidates || '[]');
  if (storedCapsules.length || storedCandidates.length) renderMemoryCandidates('a-content', storedCapsules, storedCandidates);
  appendMsg('a-content', 'assistant', item.arm_a_output || '');
  if (item.arm_a_critic_score != null) appendCriticBar('a-content', item.arm_a_critic_score);

  // B panel — thinking, tool calls, response
  appendMsg('b-content', 'user', item.prompt || '');
  const bThinkingStored = (item.arm_b_thinking || '').trim();
  if (bThinkingStored) {
    const d = createThinkingBlock('b-content');
    d.querySelector('.thinking-body').textContent = bThinkingStored;
  }
  for (const tc of parseToolCalls(item.arm_b_tool_calls)) {
    appendMsg('b-content', 'tool-call', `→ ${tc.tool}(${JSON.stringify(tc.args || {})})`);
    if (tc.result != null) appendMsg('b-content', 'tool-result', `← ${tc.tool}: ${String(tc.result).slice(0, 300)}`);
  }
  appendMsg('b-content', 'assistant', item.arm_b_output || '');

  document.getElementById('btn-rejudge').disabled = false;
  document.getElementById('btn-rejudge').textContent = 'Re-judge';
  document.getElementById('prom-verdict').textContent = '';
  document.getElementById('prom-body').textContent = '';
  setPromStatus('Loading…');

  const j = await fetch(`/api/items/${item.item_id}/judgment`).then(r => r.json()).catch(() => ({}));
  if (j && j.verdict) {
    showJudgmentInPanel(j);
  } else {
    setPromStatus('No judgment yet.');
  }
}

function _makeCapsuleEl(c, dimmed) {
  const det = document.createElement('details');
  det.className = dimmed ? 'memory-capsule memory-candidate' : 'memory-capsule';
  const sum = document.createElement('summary');
  const firstLine = (c.content || '').split('\n')[0].slice(0, 80);
  sum.appendChild(document.createTextNode(firstLine));
  if (c.score != null) {
    const scoreEl = document.createElement('span');
    scoreEl.className = 'memory-capsule-score';
    scoreEl.textContent = c.score.toFixed(2);
    sum.appendChild(scoreEl);
  }
  det.appendChild(sum);
  const body = document.createElement('div');
  body.className = 'memory-capsule-body';
  body.textContent = (c.content || '').slice(0, 600);
  det.appendChild(body);
  return det;
}

function renderMemoryCandidates(containerId, capsules, candidates) {
  if (!capsules.length && !candidates.length) return;
  const container = document.getElementById(containerId);
  for (const c of capsules) container.appendChild(_makeCapsuleEl(c, false));
  // show below-threshold candidates dimmed so user can see why they weren't used
  const usedIds = new Set(capsules.map(c => c.id));
  const below = candidates.filter(c => !usedIds.has(c.id));
  if (below.length) {
    const hdr = document.createElement('div');
    hdr.className = 'memory-candidates-header';
    hdr.textContent = 'below threshold';
    container.appendChild(hdr);
    for (const c of below) container.appendChild(_makeCapsuleEl(c, true));
  }
}

function renderCapsules(containerId, capsules) {
  renderMemoryCandidates(containerId, capsules, []);
}

function parseToolCalls(raw) {
  if (!raw) return [];
  try {
    const arr = typeof raw === 'string' ? JSON.parse(raw) : raw;
    return Array.isArray(arr) ? arr : [];
  } catch { return []; }
}

// ---------------------------------------------------------------------------
// Auto-judge (Prometheus pairwise)
// ---------------------------------------------------------------------------
async function autoJudge() {
  const itemId = currentItemId;
  if (!itemId) return;

  const btn = document.getElementById('btn-rejudge');
  btn.textContent = 'Judging…';
  btn.disabled = true;
  setPromStatus('Running Prometheus…');
  document.getElementById('prom-verdict').textContent = '';
  document.getElementById('prom-body').textContent = '';

  try {
    const res = await fetch(`/api/judge/${itemId}`, { method: 'POST' });
    const data = await res.json();
    if (data.error) {
      setPromStatus(`Error: ${data.error}`);
      btn.textContent = 'Retry';
      btn.disabled = false;
      return;
    }
    showJudgmentInPanel(data);
    updateSidebarTurnVerdict(itemId, data.verdict);
    btn.textContent = 'Re-judge';
  } catch (e) {
    setPromStatus('Judge failed.');
    btn.textContent = 'Retry';
  } finally {
    btn.disabled = false;
  }
}

function showJudgmentInPanel(data) {
  const verdict = data.verdict;
  const vEl = document.getElementById('prom-verdict');
  vEl.textContent = _VERDICT_LABELS[verdict] || verdict;
  vEl.style.color = _VERDICT_COLORS[verdict] || 'var(--text)';

  const body = document.getElementById('prom-body');
  body.innerHTML = '';

  // Rubric: extract criterion (first [bracketed] line) as summary, full scale on expand
  const rubric = (data.rubric || '').trim();
  if (rubric) {
    const m = rubric.match(/^\[([^\]]+)\]/s);
    const criterion = m ? m[1].trim() : rubric.split('\n')[0];
    const det = document.createElement('details');
    det.className = 'prom-rubric';
    const sum = document.createElement('summary');
    sum.textContent = criterion;
    det.appendChild(sum);
    const full = document.createElement('div');
    full.className = 'prom-rubric-body';
    full.textContent = rubric;
    det.appendChild(full);
    body.appendChild(det);
  }

  // Feedback: show both passes if double_judge, otherwise single
  const isDouble = data.verdict_pass1 || data.verdict_pass2;

  function appendFeedback(rawText, passLabel, passVerdict) {
    if (!rawText) return;
    const fm = rawText.match(/Feedback:\s*([\s\S]*?)(?:\[RESULT\]|$)/i);
    const text = fm ? fm[1].trim() : rawText;
    if (passLabel) {
      const lbl = document.createElement('div');
      lbl.style.cssText = 'font-size:11px;font-weight:bold;color:var(--muted);margin:10px 0 4px';
      const verdictColor = passVerdict === 'local2_better' ? 'var(--accent)' : passVerdict === 'native_better' ? 'var(--gold)' : 'var(--muted)';
      lbl.innerHTML = `${passLabel} → <span style="color:${verdictColor}">${_VERDICT_LABELS[passVerdict] || passVerdict}</span>`;
      body.appendChild(lbl);
    }
    const fdiv = document.createElement('div');
    fdiv.className = 'prom-feedback';
    fdiv.textContent = text;
    body.appendChild(fdiv);
  }

  if (isDouble) {
    appendFeedback(data.rationale || data.feedback_pass1, 'Pass 1 — LoCAL2 → A', data.verdict_pass1);
    appendFeedback(data.feedback_pass2, 'Pass 2 — Native → A', data.verdict_pass2);
  } else {
    appendFeedback(data.feedback || data.rationale, null, null);
  }

  setPromStatus('');
}

// ---------------------------------------------------------------------------
// DOM helpers
// ---------------------------------------------------------------------------
function clearPanels() {
  document.getElementById('a-content').innerHTML = '';
  document.getElementById('b-content').innerHTML = '';
}

function appendMsg(containerId, cls, text) {
  const el = document.createElement('div');
  el.className = `msg ${cls}`;
  el.textContent = text;
  document.getElementById(containerId).appendChild(el);
  el.scrollIntoView({ block: 'nearest' });
  return el;
}

function appendCriticBar(containerId, score, rubricName) {
  const el = document.createElement('div');
  el.className = 'critic-bar';
  el.innerHTML = `critic: <span class="score">● ${score}/5</span>`
    + (rubricName ? `  <span style="color:var(--muted)">${rubricName}</span>` : '');
  document.getElementById(containerId).appendChild(el);
}

function createThinkingBlock(containerId) {
  const details = document.createElement('details');
  details.className = 'thinking-block';
  details.innerHTML = '<summary>thinking</summary><div class="thinking-body"></div>';
  document.getElementById(containerId).appendChild(details);
  return details;
}

function setStatus(msg, streaming = false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (streaming ? ' streaming' : '');
}

function setPromStatus(msg) {
  document.getElementById('prom-status').textContent = msg;
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
