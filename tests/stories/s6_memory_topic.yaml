story_id: S6
title: "Topic save+recall — preference persists across sessions"
description: >
  Two-turn story across separate sessions. Turn 1 asks Gemma to remember
  a preference — Gemma should decide to call save_memory. Turn 2 starts
  a fresh session with no conversation history; the correct answer can
  only come from memory retrieval. No tool assertions — the behavioral
  test is whether the answer survives the session boundary.

turns:
  - query: >
      Please remember that I prefer dark mode for all UIs.
    expected_content:
      - "dark mode"
    must_not_contain:
      - "tool not available"
      - "tool timeout"

  - new_session: true
    query: >
      What UI preference have I told you about?
    expected_content:
      - "dark mode"
    must_not_contain:
      - "tool not available"
      - "tool timeout"
      - "no memory found"
      - "don't have"
      - "no information"

response_generation_checks:
  answer_not_empty: true

notes: >
  Turn 2 starts a new session so conversation history is not available.
  The answer can only be correct if save_memory fired in turn 1 and
  recall_memory fires in turn 2. No tool assertions — correct answer
  is the behavioral test.
  Requires nomic-embed-text: ollama pull nomic-embed-text.
