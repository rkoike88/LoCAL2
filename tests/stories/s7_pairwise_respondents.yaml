story_id: S7
title: "Dual respondents — pairwise comparison via model/sampling variation"
description: >
  Single-turn factual question sent with RespondentB enabled (--respondent-b flag).
  Verifies that: A's answer appears in UI, B's is filtered out, both get separate
  engrams in ChromaDB, and a pairwise.result event is published with a winner.

startup_flags:
  - "--respondent-b"
  - "--temperature-b"
  - "0.6"

turns:
  - query: >
      What is the boiling point of water in Celsius?
    expected_content:
      - "100"
    must_not_contain:
      - "tool not available"
      - "tool timeout"

response_generation_checks:
  answer_not_empty: true
  only_one_ui_response: true

notes: >
  Start the stack with RespondentB enabled:
    python run_local.py --respondent-b --temperature-b 0.6

  After running this story, manually verify the full pairwise path:

  1. Bus monitor: two response.generation events should appear — one with
     respondent_id="A" and one with respondent_id="B". The UI should only
     show A's answer.

  2. Bus monitor: a pairwise.result event should appear after both absolute
     critique.result events (may take ~60s total for two Prometheus grades +
     one pairwise call). Payload must contain:
       query_id_a, query_id_b, winner ("A" or "B")

  3. ChromaDB engrams: two separate engrams should exist, both with
     type="episodic". After pairwise.result arrives, both should have
     pairwise_winner: True (winner) or False (loser). Check with:
       python -c "
       import sys; sys.path.insert(0,'src')
       from local.services.memory_service import MemoryService
       svc = MemoryService()
       results = svc.search_episodic('boiling point water', n=5)
       for r in results:
           m = r['metadata']
           print(m.get('respondent_id','?'), m.get('pairwise_winner','unset'))
       "

  4. Console logs: [generator:A] and [generator:B] startup lines should
     both appear. [generator:B] should show temperature=0.6.

  Requires prometheus-7b:latest pulled in Ollama (ollama list to verify).
